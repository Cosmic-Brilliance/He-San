specification_version: 1.0.0
last_updated: 2026-06-16
cae_definition:
  name: Contextual Attribution Envelopes
  description: HKMA-compliant interpretability layer using attribution envelopes
  fields:
    - name: attribution_source
      type: string
      description: The source node or expert providing the attribution
    - name: context_window
      type: integer
      description: The number of tokens or units in the context window
    - name: ethical_hash
      type: string
      description: HMAC-SHA256 hash of the ethical evaluation context
    - name: attribution_score
      type: float
      description: Strength of the attribution (0.0 to 1.0)
    - name: timestamp
      type: string
      description: ISO-8601 timestamp of envelope generation
